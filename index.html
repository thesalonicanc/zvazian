<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astronaut Explorer - Fixed Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Poppins", sans-serif; }
        
        body { 
            background: #eeeeea; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        .wrapper { 
            width: 100%; 
            max-width: 1200px; 
            padding: 20px; 
        }

        .container { 
            height: 450px; 
            display: flex; 
            flex-direction: row;
            justify-content: center; 
            width: 100%; 
        }
        
        input { display: none; }
        
        .card-wrapper {
            width: 80px;
            margin: 0 10px;
            transition: 0.6s cubic-bezier(.28, -0.03, 0, 0.99);
            perspective: 1000px;
            cursor: pointer;
            height: 100%;
        }

        /* Saat kartu dipilih/melebar */
        input:checked + .card-wrapper { 
            width: 600px; 
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
        }

        /* TAMPILAN DEPAN */
        .card-front {
            background-color: #000;
            display: flex;
            align-items: flex-end;
        }

        .card-front::before { 
            content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 20%); z-index: 1; 
        }

        .video-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; object-fit: cover; z-index: 0; }

        /* TAMPILAN BELAKANG (SURAT) */
        .card-back {
            background-color: #f5f5dc;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            padding: 30px;
            color: black;
        }

        .letter-content {
            font-family: "Times New Roman", Times, serif;
            font-size: 12pt;
            line-height: 1.6;
            text-align: left;
            overflow-y: auto; /* Scroll aktif */
            flex-grow: 1; /* Biar ngisi ruang kosong */
            padding-right: 10px;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        /* Scrollbar Style */
        .letter-content::-webkit-scrollbar { width: 4px; }
        .letter-content::-webkit-scrollbar-thumb { background: #d1d1bc; border-radius: 10px; }

        .row { 
            color: white; 
            display: flex; 
            width: 100%; 
            position: relative; 
            z-index: 5; 
            align-items: center; 
            pointer-events: none; /* Biar klik tembus ke lingkaran angka */
        }
        
        .icons { 
            background: #223; color: white; display: flex; border-radius: 50%; 
            width: 50px; height: 50px; min-width: 50px; justify-content: center; 
            align-items: center; margin: 15px; font-weight: bold; cursor: pointer;
            pointer-events: auto; /* Tombol ini baru bisa diklik */
            transition: 0.3s;
        }

        .description { 
            opacity: 0; 
            transform: translateY(20px); 
            transition: 0.3s; 
            white-space: nowrap;
        }

        input:checked + .card-wrapper .description { opacity: 1; transform: translateY(0); }

        /* Gambar Kartu */
        .card-front.bg1 { background-image: url('https://www.image2url.com/r2/default/images/1776909952896-d729f5ca-4ed1-4fab-afb0-33d4d4ba0136.jpg'); background-size: cover; background-position: center; }
        .card-front.bg2 { background-image: url('https://www.image2url.com/r2/default/images/1776910066967-8dcbbdc9-3d0e-4efd-804b-67186b923383.jpg'); background-size: cover; background-position: center; }
        .card-front.bg3 { background-image: url('https://www.image2url.com/r2/default/images/1776910223267-06fce50b-db07-40ce-aa46-9e96ef21dfd2.jpg'); background-size: cover; background-position: center; }

        /* --- RESPONSIVE UNTUK HP --- */
        @media screen and (max-width: 768px) {
            .container { flex-direction: column; height: auto; }
            .card-wrapper { width: 100%; margin: 10px 0; height: 100px; }
            input:checked + .card-wrapper { width: 100%; height: 450px; }
            .description { white-space: normal; }
        }
    </style>
</head>
<body>

    <script>
        function flipCard(event, id) {

            const card = document.getElementById(id);
