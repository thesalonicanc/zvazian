<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astronaut Explorer - Expanding Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS BASE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: #eeeeea;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }

        .container {
            height: 400px;
            display: flex;
            flex-wrap: nowrap;
            justify-content: start;
            width: 100%;
        }

        /* --- CARD STYLING --- */
        .card {
            width: 80px;
            border-radius: 2rem;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            overflow: hidden;
            margin: 0 10px;
            display: flex;
            align-items: flex-end;
            transition: 0.6s cubic-bezier(.28, -0.03, 0, 0.99);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.8);
            position: relative;
            background-color: #000; /* Warna dasar jika video/gambar load lama */
        }

        /* Overlay gelap agar teks terbaca */
        .card::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 50%);
            z-index: 1;
        }

        /* Styling Video Background */
        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
            z-index: 0;
        }

        .card > .row {
            color: white;
            display: flex;
            flex-wrap: nowrap;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .card > .row .icons {
            background: #223;
            color: white;
            display: flex;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            min-width: 50px;
            justify-content: center;
            align-items: center;
            margin: 15px;
            font-weight: bold;
        }

        /* --- DESCRIPTION --- */
        .card > .row .description {
            display: flex;
            justify-content: center;
            flex-direction: column;
            overflow: hidden;
            height: 80px;
            width: 520px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.3s ease;
        }

        .description p {
            color: #b0b0ba;
            padding-top: 5px;
            font-size: 0.9rem;
        }

        .description h4 {
            text-transform: uppercase;
            font-size: 1.2rem;
        }

        /* --- LOGIC: CHECKBOX HACK --- */
        input {
            display: none;
        }

        input:checked + label {
            width: 600px;
        }

        input:checked + label .description {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
