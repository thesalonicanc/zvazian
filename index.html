<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astronaut Explorer - Scrollable Message</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Poppins", sans-serif; }
        body { background: #eeeeea; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .wrapper { width: 100%; max-width: 1200px; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { height: 450px; display: flex; flex-wrap: nowrap; justify-content: start; width: 100%; }
        
        input { display: none; }
        
        .card-wrapper {
            width: 80px;
            margin: 0 10px;
            transition: 0.6s cubic-bezier(.28, -0.03, 0, 0.99);
            perspective: 1000px;
            position: relative;
            z-index: 1;
        }

        input:checked + .card-wrapper { 
            width: 600px; 
            z-index: 10;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.8);
        }

        .card-front {
            background-color: #000;
            display: flex;
            align-items: flex-end;
            z-index: 2;
        }

        .card-front::before { 
            content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 50%); z-index: 1; 
        }

        .video-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; object-fit: contain; z-index: 0; background: #000; }

        .card-back {
            background-color: #f5f5dc; /* Putih Tulang */
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Mulai dari atas */
            align-items: center;
            padding: 30px 20px;
            color: black;
            z-index: 1;
        }

        /* --- BAGIAN SCROLL TEKS --- */
        .letter-content {
            font-family: "Times New Roman", Times, serif;
            font-size: 12pt;
            color: #000;
            line-height: 1.6;
            text-align: left;
            width: 100%;
            max-height: 300px; /* Batasi tinggi teks agar bisa di-scroll */
            overflow-y: auto; /* Munculkan scrollbar jika teks panjang */
            padding-right: 10px;
            margin-top: 10px;
        }

        /* Mempercantik tampilan scrollbar (opsional) */
        .letter-content::-webkit-scrollbar { width: 5px; }
        .letter-content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        .row { color: white; display: flex; flex-wrap: nowrap; width: 100%; position: relative; z-index: 5; align-items: center; }
        
        .icons { 
            background: #223; color: white; display: flex; border-radius: 50%; 
            width: 50px; height: 50px; min-width: 50px; justify-content: center; 
            align-items: center; margin: 15px; font-weight: bold; cursor: pointer;
            transition: 0.3s;
            position: relative;
            z-index: 20;
        }

        .description { 
            display: flex; justify-content: center; flex-direction: column; 
            overflow: hidden; height: 80px; width: 520px; opacity: 0; 
            transform: translateY(30px); transition: all 0.3s ease; 
        }

        input:checked + .card-wrapper .description { opacity: 1; transform: translateY(0); }

        .description h4 { text-transform: uppercase; font-size: 1.2rem; text-align: left; }
        .description p { color: #b0b0ba; font-size: 0.9rem; text-align: left; }

        .card-front.bg1 { background-image: url('https://www.image2url.com/r2/default/images/1776909952896-d729f5ca-4ed1-4fab-afb0-33d4d4ba0136.jpg'); background-size: cover; background-position: center; }
        .card-front.bg2 { background-image: url('https://www.image2url.com/r2/default/images/1776910066967-8dcbbdc9-3d0e-4efd-804b-67186b923383.jpg'); background-size: cover; background-position: center; }
        .card-front.bg3 { background-image: url('https://www.image2url.com/r2/default/images/1776910223267-06fce50b-db07-40ce-aa46-9e96ef21dfd2.jpg'); background-size: cover; background-position: center; }

        @media screen and (max-width: 768px) {
            .container { height: auto; flex-direction: column; }
            .card-wrapper { width: 100% !important; height: 100px; margin: 10px 0; }
            input:checked + .card-wrapper { height: 450px !important; }
            .letter-content { max-height: 280px; } /* Sesuaikan untuk HP */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="container">
            <input type="radio" name="slide" id="c1" checked>
            <label for="c1" class="card-wrapper">
                <div class="card-inner" id="inner1">
                    <div class="card-front bg1">
                        <div class="row">
                            <div class="icons" onclick="flipCard(event, 'inner1')">1</div>
                            <div class="description"><h4>12.12.25</h4><p>Klik angka untuk baca surat...</p></div>
                        </div>
                    </div>
                    <div class="card-back">
                        <div class="letter-content">
                            <p>Halo bubbaku sayang,<br><br>Ini adalah surat pertama buat kamu. Makasih ya sudah ada di hidupku dan selalu bikin hari-hariku jadi lebih berwarna. Aku sayang banget sama kamu! Kamu itu orang yang sangat spesial. Kalau teks ini aku buat sangat panjang sampai ke bawah, kamu sekarang sudah bisa men-scrollnya dengan lancar tanpa takut teksnya hilang atau terpotong. Coba saja masukkan teks yang sangat panjang di sini, nanti scrollbar-nya akan muncul di samping secara otomatis.</p>
                        </div>
                        <div class="icons" style="margin-top:15px; background:#000;" onclick="flipCard(event, 'inner1')">↩</div>
                    </div>
                </div>
            </label>

            <input type="radio" name="slide" id="c2">
            <label for="c2" class="card-wrapper">
                <div class="card-inner" id="inner2">
                    <div class="card-front bg2">
                        <div class="row">
                            <div class="icons" onclick="flipCard(event, 'inner2')">2</div>
                            <div class="description"><h4>Wishlist</h4><p>Buka pesan rahasianya...</p></div>
                        </div>
                    </div>
                    <div class="card-back">
                        <div class="letter-content">
                            <p>Wishlist kita tahun depan:<br>1. Jalan-jalan bareng<br>2. Makan es krim sepuasnya<br>3. Selalu bahagia berdua.<br><br>Amin paling kencang! Semoga semua impian kita bisa terwujud satu per satu ya sayang. I love you!</p>
                        </div>
                        <div class="icons" style="margin-top:15px; background:#000;" onclick="flipCard(event, 'inner2')">↩</div>
                    </div>
                </div>
            </label>

            <input type="radio" name="slide" id="c3">
            <label for="c3" class="card-wrapper">
                <div class="card-inner" id="inner3">
                    <div class="card-front bg3">
                        <div class="row">
                            <div class="icons" onclick="flipCard(event, 'inner3')">3</div>
                            <div class="description"><h4>Selamanya</h4><p>Pesan singkat buat kamu...</p></div>
                        </div>
                    </div>
                    <div class="card-back">
                        <div class="letter-content">
                            <p>Only Kapit, selamanya Kapit.<br><br>Gak ada yang bisa gantiin posisi kamu. Tetap jadi alasan aku buat tersenyum setiap hari ya! Kamu adalah bagian terbaik dalam hidupku.</p>
                        </div>
                        <div class="icons" style="margin-top:15px; background:#000;" onclick="flipCard(event, 'inner3')">↩</div>
                    </div>
                </div>
            </label>

            <input type="radio" name="slide" id="c4">
            <label for="c4" class="card-wrapper">
                <div class="card-inner" id="inner4">
                    <div class="card-front">
                        <video autoplay loop playsinline class="video-bg" id="myVideo">
                            <source src="https://www.image2url.com/r2/default/videos/1776927267730-28f1983f-94a1-4155-9b43-8cd3639b2f90.mp4" type="video/mp4">
                        </video>
                        <div class="row">
                            <div class="icons" onclick="flipCard(event, 'inner4')">4</div>
                            <div class="description"><h4>Special For U</h4><p>Klik angka untuk lihat pesan...</p></div>
                        </div>
                    </div>
                    <div class="card-back">
                        <div class="letter-content">
                            <p>Love u more and more!<br><br>Video ini spesial buat kamu. Setiap kali kamu merasa lelah, ingat ya kalau aku selalu ada di sini buat dukung kamu. Semangat terus bubbaku! Kamu pasti bisa melewati semuanya.</p>
                        </div>
                        <div class="icons" style="margin-top:15px; background:#000;" onclick="flipCard(event, 'inner4')">↩</div>
                    </div>
                </div>
            </label>

        </div>
    </div>

    <script>
        function flipCard(event, id) {
            event.stopPropagation();
            const card = document.getElementById(id);
            card.classList.toggle('is-flipped');
            
            const video = document.getElementById('myVideo');
            if (video) {
                video.muted = false;
                video.play().catch(e => {});
            }
        }
    </script>
</body>
</html>
