<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astronaut Explorer - Expanding Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS BASE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: #eeeeea;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }

        .container {
            height: 400px;
            display: flex;
            flex-wrap: nowrap;
            justify-content: start;
            width: 100%;
        }

        /* --- CARD STYLING --- */
        .card {
            width: 80px;
            border-radius: 2rem;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            overflow: hidden;
            margin: 0 10px;
            display: flex;
            align-items: flex-end;
            transition: 0.6s cubic-bezier(.28, -0.03, 0, 0.99);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        /* Overlay gelap agar teks terbaca */
        .card::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 50%);
            z-index: 1;
        }

        .card > .row {
            color: white;
            display: flex;
            flex-wrap: nowrap;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .card > .row .icons {
            background: #223;
            color: white;
            display: flex;
            border-radius: 50%;
            width: 50px;
            height: 50px; /* Ditambahkan agar bulat sempurna */
            min-width: 50px;
            justify-content: center;
            align-items: center;
            margin: 15px;
            font-weight: bold;
        }

        /* --- DESCRIPTION --- */
        .card > .row .description {
            display: flex;
            justify-content: center;
            flex-direction: column;
            overflow: hidden;
            height: 80px;
            width: 520px;
            opacity: 0;
            transform: translateY(30px);
            transition-delay: 0.3s;
            transition: all 0.3s ease;
        }

        .description p {
            color: #b0b0ba;
            padding-top: 5px;
            font-size: 0.9rem;
        }

        .description h4 {
            text-transform: uppercase;
            font-size: 1.2rem;
        }

        /* --- LOGIC: CHECKBOX HACK --- */
        input {
            display: none;
        }

        input:checked + label {
            width: 600px;
        }

        input:checked + label .description {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        /* --- IMAGES --- */
        /* Gantilah URL ini dengan gambar asli atau placeholder */
        .card[for="c1"] { background-image: url('https://www.image2url.com/r2/default/images/1776909952896-d729f5ca-4ed1-4fab-afb0-33d4d4ba0136.jpg'); }
        .card[for="c2"] { background-image: url('https://www.image2url.com/r2/default/images/1776910066967-8dcbbdc9-3d0e-4efd-804b-67186b923383.jpg'); }
        .card[for="c3"] { background-image: url('https://www.image2url.com/r2/default/images/1776910223267-06fce50b-db07-40ce-aa46-9e96ef21dfd2.jpg'); }
        .card[for="c4"] { background-image: url('https://www.image2url.com/r2/default/videos/1776911692901-938d15b1-b03c-488a-bdd7-07a50acae330.gif'); }

        /* --- RESPONSIVE --- */
        @media screen and (max-width: 768px) {
            .container {
                height: 500px;
                flex-direction: column;
            }
            .card {
                width: 100% !important;
                height: 80px;
                margin: 5px 0;
            }
            input:checked + label {
                height: 250px !important;
                width: 100% !important;
            }
        }

        /* --- INI KUNCI AGAR TIDAK GEPENG DI HP --- */
@media screen and (max-width: 768px) {
    .container {
        height: auto; /* Tinggi menyesuaikan jumlah kartu */
        flex-direction: column; /* Kartu disusun ke bawah */
    }

    .card {
        width: 100% !important; /* Kartu memenuhi lebar layar HP */
        height: 80px; /* Saat tertutup, kartu jadi pendek (gepeng horizontal) */
        margin: 5px 0;
    }

    input:checked + label {
        height: 250px !important; /* Saat diklik, kartu meluas ke bawah */
        width: 100% !important;
    }

    .card > .row .description {
        width: 100%; /* Deskripsi tidak keluar layar */
    }
}
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="container">
            <input type="radio" name="slide" id="c1" checked>
            <label for="c1" class="card">
                <div class="row">
                    <div class="icons">1</div>
                    <div class="description">
                        <h4>12.12.25</h4>
                        <p>Roketto dengan segala kenangannya</p>
                    </div>
                </div>
            </label>

            <input type="radio" name="slide" id="c2">
            <label for="c2" class="card">
                <div class="row">
                    <div class="icons">2</div>
                    <div class="description">
                        <h4>12.12.25</h4>
                        <p>INI WISHLIST TOP.1</p>
                    </div>
                </div>
            </label>

            <input type="radio" name="slide" id="c3">
            <label for="c3" class="card">
                <div class="row">
                    <div class="icons">3</div>
                    <div class="description">
                        <h4>12.12.25</h4>
                        <p>only kapit, selamanya kapit</p>
                    </div>
                </div>
            </label>

            <input type="radio" name="slide" id="c4">
            <label for="c4" class="card">
                <div class="row">
                    <div class="icons">4</div>
                    <div class="description">
                        <h4>for u, bubbaku</h4>
                        <p>hehehe love u more and more</p>
                    </div>
                </div>
            </label>
        </div>
    </div>

</body>
</html>
